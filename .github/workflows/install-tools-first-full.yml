name: install-tools-first-full
on:
  workflow_dispatch:
jobs:
  install:
    timeout-minutes: 360
    strategy:
      matrix:
        meta:
          #- ubuntu-desktop
          - kubuntu-desktop
          #- lubuntu-desktop
          #- xubuntu-desktop
    runs-on: ubuntu-latest
    steps:
      - name: Prepare
        timeout-minutes: 360
        run: |
          cd ~
          sudo apt update
          sudo DEBIAN_FRONTEND=noninteractive apt install lxc lxc-templates uidmap bridge-utils -y
          sudo lxc-create -n runner -t download -- -d ubuntu -r resolute -a amd64
      - name: Run install-tools-first.sh
        timeout-minutes: 360
        run: |
          sudo podman run --rm --privileged ubuntu:26.04 bash -c ' 
            set -euxo pipefail
            useradd -m runner
            chown -R runner:runner "$GITHUB_WORKSPACE"
            usermod -aG sudo runner
            mkdir -p /etc/sudoers.d
            echo 'runner ALL=(ALL) NOPASSWD:ALL' >/etc/sudoers.d/runner
            chmod 440 /etc/sudoers.d/runner
            apt update
            DEBIAN_FRONTEND=noninteractive apt install sudo -y
            su - runner <<'88837a96-9ded-412a-81c4-eff9b1ef1822'
            set -euxo pipefail
            FIRSTDF=$(df --output=used / | tail -n1)
            sudo DEBIAN_FRONTEND=noninteractive apt install git ${{ matrix.meta }} -y
            sudo apt clean
            SECONDDF=$(df --output=used / | tail -n1)
            git clone https://github.com/Willie169/ubuntu-setup-with-vnc-and-gpu.git
            cd ubuntu-setup-with-vnc-and-gpu
            ./install-tools-first.sh --full
            echo "FIRSTDF: $FIRSTDF"
            echo "SECONDDF: $SECONDDF"
            88837a96-9ded-412a-81c4-eff9b1ef1822
          '
