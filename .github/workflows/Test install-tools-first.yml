name: Test install-tools-first

on:
  workflow_dispatch:

jobs:
  install:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Patch script
        run: |
          perl -0777 -i -pe '
          s/wget --tries=100 --retry-connrefused --waitretry=5 https:\/\/mirror\.ctan\.org.*cd physics-patch \|\| exit\ngit checkout dev\ncd ~ \|\| exit//s;
          s/export KICAD_VERSION.*Icon=\$HOME\/\.local\/kicad\/icon_kicad\.ico\nTerminal=false\nCategories=Development;\nEOF//s;
          ' install-tools-first.sh
          perl -i -pe '
          s/^npm i\b(.*)/npm i$1 --dry-run/;
          s/^brew install\b(.*)/brew install$1 --dry-run/;
          s/^deb-get install.*//;
          s/^sudo flatpak.*//;
          s/^sudo fc-cache -fv//;
          s/^sudo reboot//;
          s/^[ \t]*fcitx5 &//;
          s/^echo y \| sudo ubuntu-drivers [a-z]+ \|\| true//;
          s/^sudo apt install (brave-browser|rustdesk rustdesk-server|lazygit|eza|gitcomet|element-desktop) -y/sudo apt install $1 -y --dry-run/;
          BEGIN { $seen = 0; $count = 0 }
          if (!$seen && /sudo apt upgrade -y/) {
            $seen = 1;
            $count = 3;
          }
          if ($seen && $count > 0) {
            if ($count < 3) {
              s/$/ --dry-run/;
            }
            $count--;
            if ($count == 0) {
                $_ .= "sudo apt install apparmor-utils apt-transport-https build-essential ca-certificates clamav clamav-daemon clinfo cmake curl dbus debian-archive-keyring debian-keyring default-jdk dnscrypt-proxy g++ gcc git gpg jq libeigen3-dev libqt5svg5-dev make maven ninja-build ocl-icd-opencl-dev perl python-is-python3 python3 qtbase5-dev qtbase5-dev-tools wget -y\n";
            }
          }
          ' install-tools-first.sh

      - name: Setup environment
        run: |
          sudo apt update
          sudo apt install ubuntu-desktop-minimal -y

      - name: Run install-tools-first.sh
        run: |
          ./install-tools-first.sh 2>&1 | tee install-tools-first.log

      - name: Upload log file
        uses: actions/upload-artifact@v4
        with:
          name: install-tools-first.log
          path: install-tools-first.log
