name: Test install-tools-first

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  install:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          sudo apt update
          sudo apt install ubuntu-gnome-desktop openssl perl -y

      - name: Patch script
        run: |
          decoded=$(printf '%s' "" | base64 -d)
          perl -0777 -i -pe '
          BEGIN {
            $s = $ENV{"decoded"};
            $s = quotemeta($s);
          }
          s/$s//g;
          ' -- "install-tools-first.sh"
          perl -0777 -i -pe 's/sudo reboot//g;' -- "install-tools-first.sh"

      - name: Run install-tools-first.sh
        run: |
          ./install-tools-first.sh 2>&1 | tee install-tools-first.log

      - name: Upload log file
        uses: actions/upload-artifact@v4
        with:
          name: install-tools-first.log
          path: install-tools-first.log
