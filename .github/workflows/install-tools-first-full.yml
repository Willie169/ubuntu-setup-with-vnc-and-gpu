name: install-tools-first-full
on:
  workflow_dispatch:
jobs:
  install:
    timeout-minutes: 360
    strategy:
      matrix:
#        image: 
#          - ubuntu/26.04
#        meta:
#          - ubuntu-desktop
#          - kubuntu-desktop
#          - lubuntu-desktop
#          - xubuntu-desktop
#        flag:
#          - --full
        include:
          - image: ubuntu/24.04
            meta: bash
            flag: --test --full
          - image: ubuntu/26.04
            meta: bash
            flag: --test --full
    runs-on: ubuntu-latest
    steps:
      - name: Prepare
        timeout-minutes: 360
        run: |
          set -euxo pipefail
          cd ~
          sudo apt update
          sudo DEBIAN_FRONTEND=noninteractive apt install wget -y
          sudo wget --tries=100 --retry-connrefused --waitretry=5 -O /etc/apt/keyrings/zabbly.asc https://pkgs.zabbly.com/key.asc
          echo "Enabled: yes
          Types: deb
          URIs: https://pkgs.zabbly.com/incus/stable
          Suites: $(. /etc/os-release && echo ${VERSION_CODENAME})
          Components: main
          Architectures: amd64
          Signed-By: /etc/apt/keyrings/zabbly.asc
          " | sudo tee /etc/apt/sources.list.d/zabbly-incus-stable.sources >/dev/null
          sudo apt update
          sudo DEBIAN_FRONTEND=noninteractive apt install btrfs-progs dnsmasq-base incus -y
          cat <<'EOF' | sudo incus admin init --preseed
          config: {}
          networks:
            - config:
                ipv4.address: auto
                ipv6.address: auto
              description: ""
              name: incusbr0
              type: ""
              project: default
          storage_pools:
            - config:
                source: /var/lib/incus/storage-pools/default
              description: ""
              name: default
              driver: dir
          storage_volumes: []
          profiles:
            - config: {}
              description: ""
              devices:
                eth0:
                  name: eth0
                  network: incusbr0
                  type: nic
                root:
                  path: /
                  pool: default
                  type: disk
              name: default
              project: default
          projects: []
          certificates: []
          cluster_groups: []
          cluster: null
          EOF
          sudo ufw --force disable || true
          ping ghcr.io -c 1
          sudo incus launch images:${{ matrix.image }} runner
      - name: Run install-tools-first.sh
        timeout-minutes: 360
        run: |
          sudo incus exec runner -- bash <<'2538a64a-9a35-480e-8d91-8ab414fc3e04'
          set -euxo pipefail
          useradd -m runner
          usermod -aG sudo runner
          mkdir -p /etc/sudoers.d
          echo 'runner ALL=(ALL) NOPASSWD:ALL' >/etc/sudoers.d/runner
          chmod 440 /etc/sudoers.d/runner
          apt update
          DEBIAN_FRONTEND=noninteractive apt install sudo -y
          su -s /bin/bash - runner <<'88837a96-9ded-412a-81c4-eff9b1ef1822'
          set -euxo pipefail
          cd ~
          FIRSTDF=$(df --output=used / | tail -n1)
          sudo DEBIAN_FRONTEND=noninteractive apt install git ${{ matrix.meta }} -y || true
          sudo apt clean
          SECONDDF=$(df --output=used / | tail -n1)
          git clone https://github.com/Willie169/ubuntu-setup-with-vnc-and-gpu.git
          cd ubuntu-setup-with-vnc-and-gpu
          ./install-tools-first.sh ${{ matrix.flag }}
          echo "FIRSTDF: $FIRSTDF"
          echo "SECONDDF: $SECONDDF"
          88837a96-9ded-412a-81c4-eff9b1ef1822
          2538a64a-9a35-480e-8d91-8ab414fc3e04
          sudo incus delete runner --force
